<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Real-Time Sportsbook</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="justify-content: center; align-items: center; padding: 2rem;">

    <div class="glass-card" style="width: 100%; max-width: 450px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h1 class="logo" style="justify-content: center; font-size: 2.25rem; margin-bottom: 0.5rem;">
                🏆 <span>BET-X</span>
            </h1>
            <p style="color: var(--text-muted); font-weight: 500;">Next-Gen Real-Time Sportsbook</p>
        </div>

        <!-- Success Toast after registering -->
        <div th:if="${param.success}" class="alert alert-success">
            Account created successfully! Please log in below.
        </div>

        <!-- Error Toast on invalid credentials -->
        <div th:if="${param.error}" class="alert alert-error">
            Invalid username or password. Please try again.
        </div>

        <!-- Logout alert message -->
        <div th:if="${param.logout}" class="alert alert-success" style="background: hsla(210, 100%, 59%, 0.15); border-color: var(--primary); color: var(--primary);">
            You have been securely logged out.
        </div>

        <form th:action="@{/login}" method="POST" style="display: flex; flex-direction: column;">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>

            <div class="input-group" style="margin-bottom: 2rem;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required>
            </div>

            <button type="submit" class="btn" style="width: 100%; padding: 1rem;">SIGN IN</button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.95rem;">
            New to Bet-X? <a th:href="@{/register}" style="color: var(--primary); font-weight: 600; text-decoration: underline;">Create an account</a>
        </div>
    </div>

</body>
</html>
